name: Starmer Watch refresh and deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "starmer-watch/**"
      - ".github/workflows/starmer-watch-refresh.yml"
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: starmer-watch-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Refresh dashboard data
        env:
          ENABLE_GDELT: "1"
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY || secrets.GUARDIAN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node starmer-watch/scripts/refresh-data.mjs

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add starmer-watch/data/latest.json starmer-watch/data/history.json
          if [ -f starmer-watch/data/alert-state.json ]; then
            git add starmer-watch/data/alert-state.json
          fi
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Starmer Watch data"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: starmer-watch

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
